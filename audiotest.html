<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio-Test</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111; color: #fff; padding: 30px 20px; text-align: center; }
  button { background: #FF6B00; color: #000; border: none; padding: 20px 30px; font-size: 18px; font-weight: 700;
    border-radius: 10px; margin: 12px 0; width: 100%; max-width: 320px; }
  #log { text-align: left; background: #1a1a1a; border-radius: 8px; padding: 16px; margin-top: 24px;
    font-family: monospace; font-size: 13px; white-space: pre-wrap; max-width: 500px; margin-left:auto; margin-right:auto; }
  .ok { color: #4ade80; } .err { color: #f87171; } .info { color: #FF6B00; }
</style>
</head>
<body>
<h1>🎷 Audio-Test</h1>
<p>Tippe die Buttons der Reihe nach an und schau, was im Log unten erscheint.</p>

<button onclick="step1()">1️⃣ AudioContext erstellen</button><br>
<button onclick="step2()">2️⃣ Einfachen Ton abspielen (Beep)</button><br>
<button onclick="step3()">3️⃣ Lauten Ton abspielen (Test)</button><br>

<div id="log">Bereit. Tippe Schritt 1.</div>

<script>
let ctx = null;
const log = document.getElementById('log');
function addLog(msg, cls) {
  const line = document.createElement('div');
  line.textContent = msg;
  if (cls) line.className = cls;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function step1() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { addLog('❌ AudioContext API nicht verfügbar!', 'err'); return; }
    ctx = new AC();
    addLog('✅ AudioContext erstellt. State: ' + ctx.state, 'ok');
    if (ctx.state === 'suspended') {
      ctx.resume().then(() => addLog('✅ Resume aufgerufen. Neuer State: ' + ctx.state, 'ok'));
    }
  } catch (e) {
    addLog('❌ Fehler beim Erstellen: ' + e.message, 'err');
  }
}

function step2() {
  if (!ctx) { addLog('⚠️ Erst Schritt 1 ausführen!', 'err'); return; }
  if (ctx.state === 'suspended') ctx.resume();
  addLog('ℹ️ Context state vor Ton: ' + ctx.state, 'info');
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 440;
    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
    addLog('✅ Ton abgespielt (440Hz, 0.5s). Hörst du einen Piepton?', 'ok');
  } catch (e) {
    addLog('❌ Fehler beim Abspielen: ' + e.message, 'err');
  }
}

function step3() {
  if (!ctx) { addLog('⚠️ Erst Schritt 1 ausführen!', 'err'); return; }
  if (ctx.state === 'suspended') ctx.resume();
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.value = 220;
    gain.gain.setValueAtTime(0.9, ctx.currentTime);
    gain.gain.setValueAtTime(0.9, ctx.currentTime + 0.8);
    gain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 1.0);
    osc.start();
    osc.stop(ctx.currentTime + 1.0);
    addLog('✅ Lauter Ton abgespielt (1 Sekunde, sehr laut). State: ' + ctx.state, 'ok');
  } catch (e) {
    addLog('❌ Fehler: ' + e.message, 'err');
  }
}

window.onerror = function(msg, url, line) {
  addLog('🔴 JS-Fehler: ' + msg + ' (Zeile ' + line + ')', 'err');
};
</script>
</body>
</html>
