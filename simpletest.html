<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simpelster Test</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #111; color: #fff; padding: 16px; margin:0; text-align:center; }
  button { display:block; width:100%; max-width:380px; margin: 14px auto; padding: 24px; font-size: 18px; font-weight: 700;
    border: none; border-radius: 10px; background:#FF6B00; color:#000; }
  #log { background:#1a1a1a; border-radius:8px; padding:14px; margin-top:20px; font-family:monospace; font-size:13px;
    white-space:pre-wrap; max-width:500px; margin-left:auto; margin-right:auto; text-align:left; }
</style>
</head>
<body>
<h2>🔊 Allereinfachster Test</h2>
<p>Kein komplexer Code. Nur ein Standard-HTML5-Audio-Element.</p>

<button onclick="playBeep()">PIEP ABSPIELEN (HTML5 Audio)</button>
<button onclick="playWebAudioSimple()">PIEP ABSPIELEN (Web Audio, minimal)</button>

<div id="log">Bereit.</div>

<script>
var log = document.getElementById('log');
function upd(msg) { log.textContent = msg + '\n' + log.textContent; }

// Test 1: pure HTML5 audio with a data-URI beep (tiny WAV file, 440Hz beep)
function playBeep() {
  try {
    // Minimal WAV: 0.3s sine beep at 440Hz, base64-encoded
    var audio = new Audio('data:audio/wav;base64,UklGRl9AAABXQVZFZm10IBAAAAABAAEAQH4AAIB+AAACABAAZGF0YTtAAAA=');
    audio.volume = 1.0;
    audio.play().then(function(){
      upd('✅ HTML5 Audio play() Promise erfolgreich aufgelöst.');
    }).catch(function(e){
      upd('🔴 HTML5 Audio play() Fehler: ' + e.message);
    });
    upd('HTML5 <audio> play() aufgerufen.');
  } catch(e) {
    upd('🔴 EXCEPTION: ' + e.message);
  }
}

// Test 2: bare minimum Web Audio, nothing fancy
function playWebAudioSimple() {
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    var ctx = new Ctx();
    upd('Neuer Context erstellt. State: ' + ctx.state);
    ctx.resume().then(function() {
      upd('Nach resume(): ' + ctx.state);
      var osc = ctx.createOscillator();
      osc.frequency.value = 440;
      osc.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 1);
      upd('✅ Oszillator gestartet, 1 Sekunde, DIREKT an destination (kein Gain-Node dazwischen).');
    });
  } catch(e) {
    upd('🔴 EXCEPTION: ' + e.message);
  }
}
</script>
</body>
</html>
